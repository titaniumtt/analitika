<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamzir Аналитика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { opacity: 0.9; margin-bottom: 24px; line-height: 1.5; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ff6b6b; margin-top: 12px; font-size: 14px; }
        a { color: #ffd700; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h1>📊 SAP B1 Аналитика</h1>
        <p id="status">Подключение к серверу...</p>
        <div id="error"></div>
    </div>
    <script>
        (async () => {
            try {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }
                const res = await fetch('url.txt?t=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const url = (await res.text()).trim();
                if (!url.startsWith('http')) throw new Error('Некорректный URL');
                document.getElementById('status').textContent = 'Открываем...';
                window.location.replace(url);
            } catch (err) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').textContent = 'Сервер недоступен';
                document.getElementById('error').innerHTML = '<div class="error">' + err.message + '<br><br>Проверьте, что служба Analitika запущена.</div>';
            }
        })();
    </script>
</body>
</html>
